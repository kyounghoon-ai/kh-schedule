<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 업무 관리</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: white;
            border-bottom: 1px solid #e5e5e5;
            padding: 20px 0;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 20px;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .view-toggle {
            display: flex;
            gap: 8px;
        }

        button {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        button.active {
            background: #3B8BD4;
            color: white;
            border-color: #3B8BD4;
        }

        .legend {
            display: flex;
            gap: 20px;
            padding: 0 20px;
            font-size: 12px;
            color: #666;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        .color-work { background-color: #3B8BD4; }
        .color-personal { background-color: #639922; }
        .color-team { background-color: #D4537E; }

        .main-layout {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 20px;
            min-height: 700px;
        }

        .calendar-section, .task-section {
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #e5e5e5;
        }

        .week-nav {
            font-size: 14px;
            font-weight: 500;
        }

        .nav-btn {
            padding: 6px 12px;
            margin: 0 8px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .month-grid {
            display: none;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            padding: 20px;
            flex: 1;
            overflow-y: auto;
            background: #e5e5e5;
        }

        .month-grid.active {
            display: grid;
        }

        .week-day-header {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .week-day-header.saturday {
            color: #3B8BD4;
            font-weight: 700;
        }

        .week-day-header.sunday {
            color: #d32f2f;
            font-weight: 700;
        }

        .day-cell {
            background: #fafafa;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            padding: 8px;
            min-height: 120px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }

        .day-cell:hover {
            background: #f0f0f0;
        }

        .day-cell.selected {
            border: 2px solid #3B8BD4;
            background: #e6f1fb;
        }

        .day-cell.saturday {
            background: #e6f1fb;
        }

        .day-cell.sunday, .day-cell.holiday {
            background: #fcebeb;
        }

        .day-date {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 3px;
            color: #333;
        }

        .day-date.saturday {
            color: #3B8BD4;
        }

        .day-date.sunday {
            color: #d32f2f;
        }

        .day-holiday-name {
            font-size: 9px;
            color: #d32f2f;
            margin-bottom: 4px;
            font-weight: 500;
            line-height: 1.2;
        }

        .day-events {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            overflow: hidden;
        }

        .event-badge {
            font-size: 10px;
            padding: 2px 4px;
            border-radius: 2px;
            color: white;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
        }

        .event-badge.work { background-color: #3B8BD4; }
        .event-badge.personal { background-color: #639922; }
        .event-badge.team { background-color: #D4537E; }

        .month-day {
            background: white;
            padding: 8px;
            min-height: 100px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }

        .month-day:hover {
            background: #f0f0f0;
        }

        .month-day.selected {
            background: #e6f1fb;
            border: 2px solid #3B8BD4;
        }

        .month-day.other-month {
            background: #f9f9f9;
            color: #ccc;
        }

        .month-day.saturday {
            background: #f5f9ff;
        }

        .month-day.sunday {
            background: #fff8f8;
        }

        .month-date {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .month-date.saturday {
            color: #3B8BD4;
        }

        .month-date.sunday {
            color: #d32f2f;
        }

        .month-events {
            font-size: 9px;
            color: #666;
            overflow: hidden;
        }

        .month-event-dot {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            margin-right: 2px;
        }

        .task-header {
            padding: 20px;
            border-bottom: 1px solid #e5e5e5;
        }

        .selected-date {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
        }

        .selected-date-value {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .add-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        .add-btn {
            padding: 10px;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .add-btn.work { background: #3B8BD4; }
        .add-btn.personal { background: #639922; }
        .add-btn.team { background: #D4537E; }

        .add-btn:hover {
            opacity: 0.9;
        }

        .task-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .task-list-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            color: #333;
        }

        .task-counter {
            font-weight: 400;
            color: #999;
            font-size: 12px;
        }

        .task-list {
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            overflow: hidden;
        }

        .task-item {
            padding: 12px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            gap: 10px;
            align-items: center;
            cursor: pointer;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item:hover {
            background: #f9f9f9;
        }

        .task-item input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .task-text {
            flex: 1;
            font-size: 13px;
        }

        .task-item input[type="checkbox"]:checked + .task-text {
            text-decoration: line-through;
            color: #999;
        }

        .task-info {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .task-category {
            font-size: 10px;
            padding: 3px 6px;
            border-radius: 3px;
            color: white;
            white-space: nowrap;
        }

        .task-category.work { background-color: #3B8BD4; }
        .task-category.personal { background-color: #639922; }
        .task-category.team { background-color: #D4537E; }

        .task-subcategory {
            font-size: 10px;
            padding: 3px 6px;
            border-radius: 3px;
            background: #f0f0f0;
            color: #666;
            white-space: nowrap;
        }

        .filter-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e5e5;
        }

        .filter-title {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .filter-btn {
            padding: 4px 12px;
            font-size: 12px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
        }

        .filter-btn.active {
            background: #3B8BD4;
            color: white;
            border-color: #3B8BD4;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 13px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
        }

        .modal-overlay.open {
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .modal {
            background: white;
            border-radius: 16px 16px 0 0;
            width: 100%;
            max-width: 560px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px 20px 40px;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: #3B8BD4;
            box-shadow: 0 0 0 3px rgba(59,139,212,0.1);
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .category-btn {
            padding: 12px;
            border: 1.5px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
        }

        .category-btn:hover {
            border-color: #3B8BD4;
        }

        .category-btn.selected {
            color: white;
            border-color: white;
        }

        .category-btn.work.selected {
            background: #3B8BD4;
        }

        .category-btn.personal.selected {
            background: #639922;
        }

        .category-btn.team.selected {
            background: #D4537E;
        }

        .sub-category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .sub-category-btn {
            padding: 10px;
            border: 1.5px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
            transition: all 0.2s;
        }

        .sub-category-btn:hover {
            border-color: #999;
            background: #f9f9f9;
        }

        .sub-category-btn.selected {
            color: white;
            border: none;
            font-weight: 600;
            transform: scale(1.05);
        }

        .sub-category-btn.work.selected {
            background: #3B8BD4;
            box-shadow: 0 4px 12px rgba(59, 139, 212, 0.4);
        }

        .sub-category-btn.personal.selected {
            background: #639922;
            box-shadow: 0 4px 12px rgba(99, 153, 34, 0.4);
        }

        .sub-category-btn.team.selected {
            background: #D4537E;
            box-shadow: 0 4px 12px rgba(212, 83, 126, 0.4);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel {
            background: #e5e5e5;
            color: #333;
        }

        .btn-save {
            background: #3B8BD4;
            color: white;
        }

        .btn-save:hover {
            background: #2a6ba0;
        }

        .date-time-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .message-box {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            font-weight: 500;
            display: none;
            border-left: 4px solid;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            border-left-color: #2e7d32;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            border-left-color: #c62828;
        }

        .message-box.show {
            display: block;
        }

        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        /* ===== 마감 임박 알림 배너 ===== */
        .due-banner {
            background: #fff8e1;
            border: 1px solid #ffcc02;
            border-left: 4px solid #f59e0b;
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 12px;
            font-size: 12px;
            display: none;
        }
        .due-banner.show { display: block; }
        .due-banner-title {
            font-weight: 600;
            color: #92400e;
            margin-bottom: 6px;
        }
        .due-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            border-bottom: 1px solid #fde68a;
            color: #78350f;
        }
        .due-item:last-child { border-bottom: none; }
        .due-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 600;
        }
        .due-today { background: #fee2e2; color: #991b1b; }
        .due-tomorrow { background: #fef3c7; color: #92400e; }
        .due-soon { background: #e0f2fe; color: #075985; }

        /* ===== 할일 항목 마감 강조 ===== */
        .task-item.overdue { background: #fff5f5; }
        .task-item.due-today-item { background: #fffbeb; }
        .task-due-label {
            font-size: 10px;
            color: #ef4444;
            font-weight: 600;
        }

        /* ===== 헤더 버튼 ===== */
        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .header-btn {
            padding: 7px 14px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #555;
        }
        .header-btn:hover { background: #f5f5f5; }
        .header-btn.report-btn { border-color: #3B8BD4; color: #3B8BD4; }

        /* ===== 주간 리포트 모달 ===== */
        .report-modal { max-width: 600px; border-radius: 16px 16px 0 0; }
        .report-week-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 10px 14px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .report-week-label { font-size: 14px; font-weight: 600; }
        .report-nav-btn { background: none; border: none; font-size: 16px; cursor: pointer; padding: 4px 8px; }
        .report-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .report-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 14px;
            text-align: center;
        }
        .report-card-num {
            font-size: 28px;
            font-weight: 700;
            color: #3B8BD4;
            line-height: 1;
        }
        .report-card-label { font-size: 11px; color: #999; margin-top: 4px; }
        .report-section-title {
            font-size: 13px;
            font-weight: 600;
            margin: 16px 0 8px;
            color: #555;
        }
        .report-bar-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .report-bar-label { font-size: 12px; width: 60px; color: #666; }
        .report-bar-bg { flex: 1; background: #eee; border-radius: 4px; height: 10px; overflow: hidden; }
        .report-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
        .bar-work { background: #3B8BD4; }
        .bar-personal { background: #639922; }
        .bar-team { background: #D4537E; }
        .report-bar-count { font-size: 11px; color: #999; width: 30px; text-align: right; }
        .report-task-list { max-height: 160px; overflow-y: auto; }
        .report-task-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 12px;
        }
        .report-task-item:last-child { border-bottom: none; }
        .report-task-dot {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        }
        .report-done { text-decoration: line-through; color: #aaa; }
        .report-export-btn {
            width: 100%; padding: 11px; margin-top: 16px;
            background: #f0f7ff; color: #3B8BD4;
            border: 1.5px solid #3B8BD4; border-radius: 6px;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .report-export-btn:hover { background: #e0efff; }

        /* ===== 반복 일정 옵션 ===== */
        .repeat-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .repeat-btn {
            padding: 8px;
            border: 1.5px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
            transition: all 0.15s;
        }
        .repeat-btn:hover { border-color: #999; }
        .repeat-btn.selected {
            background: #3B8BD4;
            color: white;
            border-color: #3B8BD4;
            font-weight: 600;
        }
        .repeat-end-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>나의 업무 관리</h1>
                <div class="header-actions">
                    <button class="header-btn report-btn" onclick="openReportModal()">📊 주간 리포트</button>
                    <div class="view-toggle">
                        <button class="active" id="weekBtn" onclick="switchView('week')">주간</button>
                        <button id="monthBtn" onclick="switchView('month')">월간</button>
                    </div>
                </div>
            </div>
            <div class="legend">
                <div class="legend-item"><div class="legend-color color-work"></div><span>업무</span></div>
                <div class="legend-item"><div class="legend-color color-personal"></div><span>개인</span></div>
                <div class="legend-item"><div class="legend-color color-team"></div><span>팀연동</span></div>
            </div>
        </header>

        <div class="main-layout">
            <div class="calendar-section">
                <div class="calendar-header">
                    <div class="week-nav">
                        <button class="nav-btn" onclick="previousPeriod()">←</button>
                        <span id="periodDisplay"></span>
                        <button class="nav-btn" onclick="nextPeriod()">→</button>
                    </div>
                </div>
                <div class="week-grid" id="calendarGrid"></div>
                <div class="month-grid" id="monthGrid"></div>
            </div>

            <div class="task-section">
                <div class="task-header">
                    <div class="selected-date">선택됨</div>
                    <div class="selected-date-value" id="selectedDateDisplay">오늘</div>
                    <div class="add-buttons">
                        <button class="add-btn work" onclick="openAddModal('work')">업무</button>
                        <button class="add-btn personal" onclick="openAddModal('personal')">개인</button>
                        <button class="add-btn team" onclick="openAddModal('team')">팀연동</button>
                    </div>
                </div>

                <div class="task-content">
                    <div class="due-banner" id="dueBanner">
                        <div class="due-banner-title">⚠️ 마감 임박</div>
                        <div id="dueList"></div>
                    </div>
                    <div class="task-list-title">할일 목록 <span class="task-counter" id="taskCounter">0/0</span></div>
                    <div class="task-list" id="taskList"></div>

                    <div class="filter-section">
                        <div class="filter-title">분류 필터</div>
                        <div class="filter-buttons">
                            <button class="filter-btn active" onclick="filterByCategory('all')">전체</button>
                            <button class="filter-btn" onclick="filterByCategory('work')">업무</button>
                            <button class="filter-btn" onclick="filterByCategory('personal')">개인</button>
                            <button class="filter-btn" onclick="filterByCategory('team')">팀연동</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addModal">
        <div class="modal">

    <script>
        const koreanHolidays = {
            '2026-01-01': '신정', '2026-01-29': '설날', '2026-01-30': '설날', '2026-02-02': '대체공휴일',
            '2026-03-01': '삼일절', '2026-05-05': '어린이날', '2026-05-06': '대체공휴일',
            '2026-05-24': '부처님오탄신일', '2026-06-06': '현충일', '2026-08-15': '광복절',
            '2026-09-28': '추석', '2026-09-29': '추석', '2026-09-30': '추석',
            '2026-10-03': '개천절', '2026-10-09': '한글날', '2026-12-25': '크리스마스',
        };

        const subCategories = {
            work: ['자료요청', '자료제출', '메일회신', '업무지시', '보고', '회의', '기타'],
            personal: ['점심', '저녁', '행사', '운동', '기타'],
            team: ['회의', '교육', '행사', '공지', '기타']
        };

        const SUPABASE_URL = 'https://srcnsotfcwwvqwejfitl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNyY25zb3RmY3d3dnF3ZWpmaXRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExOTU3MTksImV4cCI6MjA5Njc3MTcxOX0.153tZC9Tkg8cP4lfzzUnRaoX5rsDT0uXU3X128p-ovU';
        
        let sbClient = null;
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let currentWeekStart = getMonday(new Date());
        let selectedDate = new Date();
        let allTasks = [];
        let currentFilter = 'all';
        let currentView = 'week';
        let selectedCategory = 'work';
        let selectedSubCategory = '';
        let selectedRepeat = 'none';
        let reportWeekStart = getMonday(new Date());

        async function init() {
            try {
                sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                console.log('✓ Supabase 연결됨');
                await loadTasks();
            } catch (e) {
                console.error('❌ 초기화 오류:', e.message);
            }
            
            setDefaultDate();
            renderCalendar();
            renderTasks();
            updateSelectedDateDisplay();
            checkDueAlerts();  // ✅ 마감 임박 알림 체크
        }

        function setDefaultDate() {
            const today = new Date();
            document.getElementById('taskDate').valueAsDate = today;
        }

        function switchView(view) {
            currentView = view;
            document.getElementById('weekBtn').classList.remove('active');
            document.getElementById('monthBtn').classList.remove('active');
            document.getElementById('calendarGrid').style.display = 'none';
            document.getElementById('monthGrid').classList.remove('active');
            
            if (view === 'week') {
                document.getElementById('weekBtn').classList.add('active');
                document.getElementById('calendarGrid').style.display = 'grid';
                currentWeekStart = getMonday(selectedDate);
            } else {
                document.getElementById('monthBtn').classList.add('active');
                document.getElementById('monthGrid').classList.add('active');
            }
            
            renderCalendar();
        }

        function getMonday(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        function formatDate(date, format = 'YYYY-MM-DD') {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const dayOfWeek = ['일', '월', '화', '수', '목', '금', '토'][date.getDay()];
            
            if (format === 'YYYY-MM-DD') return `${year}-${month}-${day}`;
            if (format === 'FULL') return `${month}월 ${day}일 (${dayOfWeek})`;
        }

        function getWeekDays(startDate) {
            const days = [];
            for (let i = 0; i < 7; i++) {
                const date = new Date(startDate);
                date.setDate(startDate.getDate() + i);
                days.push(date);
            }
            return days;
        }

        function previousPeriod() {
            if (currentView === 'week') {
                currentWeekStart.setDate(currentWeekStart.getDate() - 7);
            } else {
                currentMonth--;
                if (currentMonth < 0) {
                    currentMonth = 11;
                    currentYear--;
                }
            }
            renderCalendar();
        }

        function nextPeriod() {
            if (currentView === 'week') {
                currentWeekStart.setDate(currentWeekStart.getDate() + 7);
            } else {
                currentMonth++;
                if (currentMonth > 11) {
                    currentMonth = 0;
                    currentYear++;
                }
            }
            renderCalendar();
        }

        async function loadTasks() {
            try {
                if (!sbClient) return;
                const { data, error } = await sbClient
                    .from('tasks')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                allTasks = data || [];
                console.log('✓ tasks 로드됨:', allTasks.length + '개');
            } catch (e) {
                console.log('⚠️ Tasks 로드 오류:', e.message);
            }
        }

        function renderCalendar() {
            if (currentView === 'week') {
                renderWeekCalendar();
            } else {
                renderMonthCalendar();
            }
        }

        function renderWeekCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            const weekDays = getWeekDays(currentWeekStart);
            const weekEnd = new Date(currentWeekStart);
            weekEnd.setDate(weekEnd.getDate() + 6);
            
            document.getElementById('periodDisplay').textContent = 
                `${formatDate(currentWeekStart, 'YYYY-MM-DD').split('-')[1]}월 ${currentWeekStart.getDate()}-${weekEnd.getDate()}`;

            const dayNames = ['월', '화', '수', '목', '금', '토', '일'];
            dayNames.forEach((day, idx) => {
                const header = document.createElement('div');
                header.className = 'week-day-header';
                if (idx === 5) header.classList.add('saturday');
                if (idx === 6) header.classList.add('sunday');
                header.textContent = day;
                grid.appendChild(header);
            });

            weekDays.forEach((date, idx) => {
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                
                if (idx === 5) cell.classList.add('saturday');
                if (idx === 6) cell.classList.add('sunday');
                
                const dateStr = formatDate(date);
                if (koreanHolidays[dateStr]) {
                    cell.classList.add('holiday');
                }
                
                if (dateStr === formatDate(selectedDate)) {
                    cell.classList.add('selected');
                }
                
                cell.onclick = () => selectDate(date);

                const dateNum = String(date.getDate()).padStart(2, '0');
                let html = `<div class="day-date`;
                if (idx === 5) html += ' saturday';
                if (idx === 6 || koreanHolidays[dateStr]) html += ' sunday';
                html += `">${dateNum}</div>`;
                
                if (koreanHolidays[dateStr]) {
                    html += `<div class="day-holiday-name">${koreanHolidays[dateStr]}</div>`;
                }
                
                html += '<div class="day-events"></div>';
                cell.innerHTML = html;

                // ✅ allTasks에서 일정 가져오기
                const dayTasks = allTasks.filter(t => t.date === dateStr);
                const eventsContainer = cell.querySelector('.day-events');
                dayTasks.forEach(task => {
                    const badge = document.createElement('div');
                    badge.className = `event-badge ${task.category}`;
                    badge.textContent = task.title;
                    eventsContainer.appendChild(badge);
                });

                grid.appendChild(cell);
            });
        }

        function renderMonthCalendar() {
            const grid = document.getElementById('monthGrid');
            grid.innerHTML = '';

            document.getElementById('periodDisplay').textContent = `${currentYear}년 ${currentMonth + 1}월`;

            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            dayNames.forEach(day => {
                const header = document.createElement('div');
                header.style.background = '#f5f5f5';
                header.style.fontWeight = '600';
                header.style.textAlign = 'center';
                header.style.padding = '8px';
                header.textContent = day;
                grid.appendChild(header);
            });

            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            const prevLastDay = new Date(currentYear, currentMonth, 0);
            
            const startDate = firstDay.getDay();
            const endDate = lastDay.getDate();
            const prevEndDate = prevLastDay.getDate();

            for (let i = startDate - 1; i >= 0; i--) {
                const day = document.createElement('div');
                day.className = 'month-day other-month';
                day.textContent = prevEndDate - i;
                grid.appendChild(day);
            }

            for (let i = 1; i <= endDate; i++) {
                const day = document.createElement('div');
                const dateObj = new Date(currentYear, currentMonth, i);
                const dateStr = formatDate(dateObj);
                
                day.className = 'month-day';
                
                if (dateObj.getDay() === 5) day.classList.add('saturday');
                if (dateObj.getDay() === 0) day.classList.add('sunday');
                if (koreanHolidays[dateStr]) day.classList.add('sunday');
                
                if (dateStr === formatDate(selectedDate)) {
                    day.classList.add('selected');
                }
                
                day.onclick = () => selectDate(dateObj);
                
                const dateNum = document.createElement('div');
                dateNum.className = 'month-date';
                if (dateObj.getDay() === 5) dateNum.classList.add('saturday');
                if (dateObj.getDay() === 0 || koreanHolidays[dateStr]) dateNum.classList.add('sunday');
                dateNum.textContent = i;
                day.appendChild(dateNum);

                // ✅ allTasks에서 일정 가져오기
                const dayTasks = allTasks.filter(t => t.date === dateStr);
                if (dayTasks.length > 0) {
                    const eventsDiv = document.createElement('div');
                    eventsDiv.className = 'month-events';
                    dayTasks.forEach(t => {
                        const dot = document.createElement('span');
                        dot.className = 'month-event-dot';
                        dot.style.background = t.category === 'work' ? '#3B8BD4' : t.category === 'personal' ? '#639922' : '#D4537E';
                        eventsDiv.appendChild(dot);
                    });
                    day.appendChild(eventsDiv);
                }

                grid.appendChild(day);
            }

            for (let i = 1; i <= (42 - startDate - endDate); i++) {
                const day = document.createElement('div');
                day.className = 'month-day other-month';
                day.textContent = i;
                grid.appendChild(day);
            }
        }

        function selectDate(date) {
            selectedDate = new Date(date);
            renderCalendar();
            renderTasks();
            updateSelectedDateDisplay();
            document.getElementById('taskDate').valueAsDate = selectedDate;
        }

        function updateSelectedDateDisplay() {
            document.getElementById('selectedDateDisplay').textContent = formatDate(selectedDate, 'FULL');
        }

        function renderTasks() {
            const selectedDateStr = formatDate(selectedDate);
            let tasksToShow = allTasks.filter(t => t.date === selectedDateStr);

            if (currentFilter !== 'all') {
                tasksToShow = tasksToShow.filter(t => t.category === currentFilter);
            }

            const taskList = document.getElementById('taskList');
            const completed = tasksToShow.filter(t => t.completed).length;
            const total = allTasks.filter(t => t.date === selectedDateStr).length;

            document.getElementById('taskCounter').textContent = `${completed}/${total}`;

            if (tasksToShow.length === 0) {
                taskList.innerHTML = '<div class="empty-state">할일이 없습니다</div>';
                return;
            }

            taskList.innerHTML = tasksToShow.map(task => `
                <div class="task-item" onclick="openDetailModal('${task.id}')">
                    <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask('${task.id}', this.checked); event.stopPropagation();">
                    <span class="task-text">${task.title}</span>
                    <div class="task-info">
                        <span class="task-category ${task.category}">${getCategoryLabel(task.category)}</span>
                        ${task.sub_category ? `<span class="task-subcategory">${task.sub_category}</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function getCategoryLabel(cat) {
            const labels = { work: '업무', personal: '개인', team: '팀연동' };
            return labels[cat] || cat;
        }

        function openAddModal(category) {
            window.editingTaskId = null;  // 새로 추가 모드
            selectedCategory = category;
            selectedSubCategory = '';
            
            document.getElementById('modalTitle').textContent = category === 'work' ? '업무 추가' : category === 'personal' ? '개인 추가' : '팀연동 추가';
            document.getElementById('successMsg').classList.remove('show');
            document.getElementById('errorMsg').classList.remove('show');
            
            clearFormFields();
            renderCategoryButtons();
            renderSubCategoryButtons();
            updateFormFields();
            
            document.getElementById('addModal').classList.add('open');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('open');
            window.editingTaskId = null;
            document.getElementById('modalTitle').textContent = '할일 추가';
            clearFormFields();
        }

        function clearFormFields() {
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDesc').value = '';
            document.getElementById('startTime').value = '';
            document.getElementById('endTime').value = '';
            document.getElementById('location').value = '';
            document.getElementById('dueDate').value = '';
            document.getElementById('dueTime').value = '';
            document.getElementById('relation').value = '';
            document.getElementById('teamShare').checked = false;
            // ✅ 반복 설정 초기화
            selectedRepeat = 'none';
            document.querySelectorAll('.repeat-btn').forEach(b => b.classList.remove('selected'));
            document.querySelector('.repeat-btn').classList.add('selected');
            document.getElementById('repeatEndDate').value = '';
            document.getElementById('repeatCount').value = '';
            document.getElementById('repeatEndGroup').style.display = 'none';
        }

        function renderCategoryButtons() {
            const grid = document.getElementById('categoryGrid');
            grid.innerHTML = '';
            ['work', 'personal', 'team'].forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `category-btn ${cat} ${cat === selectedCategory ? 'selected' : ''}`;
                btn.textContent = getCategoryLabel(cat);
                btn.onclick = (e) => { selectMainCategory(cat); };
                grid.appendChild(btn);
            });
        }

        function selectMainCategory(cat) {
            selectedCategory = cat;
            selectedSubCategory = '';
            renderCategoryButtons();
            renderSubCategoryButtons();
            updateFormFields();
        }

        function renderSubCategoryButtons() {
            const options = subCategories[selectedCategory] || [];
            const grid = document.getElementById('subCategoryGrid');
            grid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = `sub-category-btn ${selectedCategory} ${opt === selectedSubCategory ? 'selected' : ''}`;
                btn.textContent = opt;
                btn.type = 'button';
                btn.onclick = (e) => { 
                    selectSubCategory(opt);
                    return false;
                };
                grid.appendChild(btn);
            });
        }

        function selectSubCategory(subCat) {
            selectedSubCategory = subCat;
            renderSubCategoryButtons();
            updateFormFields();
        }

        function updateFormFields() {
            document.getElementById('subCategoryGroup').style.display = 'block';
            
            document.getElementById('locationGroup').style.display = 'none';
            document.getElementById('relationGroup').style.display = 'none';
            document.getElementById('teamShareGroup').style.display = 'none';
            document.getElementById('timeGroup').style.display = 'none';
            document.getElementById('dueTimeGroup').style.display = 'none';

            if (selectedCategory === 'work') {
                if (['자료요청', '자료제출', '메일회신', '업무지시'].includes(selectedSubCategory)) {
                    document.getElementById('dueTimeGroup').style.display = 'grid';
                }
                else if (['보고', '회의'].includes(selectedSubCategory)) {
                    document.getElementById('timeGroup').style.display = 'grid';
                }
            } 
            else if (selectedCategory === 'personal') {
                if (selectedSubCategory === '행사') {
                    document.getElementById('timeGroup').style.display = 'grid';
                    document.getElementById('locationGroup').style.display = 'block';
                }
                else if (['점심', '저녁'].includes(selectedSubCategory)) {
                    document.getElementById('timeGroup').style.display = 'grid';
                }
                else if (selectedSubCategory === '운동') {
                    document.getElementById('timeGroup').style.display = 'grid';
                    document.getElementById('locationGroup').style.display = 'block';
                }
                document.getElementById('relationGroup').style.display = 'block';
            }
            else if (selectedCategory === 'team') {
                if (['회의', '교육', '행사'].includes(selectedSubCategory)) {
                    document.getElementById('timeGroup').style.display = 'grid';
                    document.getElementById('locationGroup').style.display = 'block';
                }
                document.getElementById('teamShareGroup').style.display = 'block';
            }
        }

        function saveTask() {
            const title = document.getElementById('taskTitle').value.trim();
            
            if (!title) {
                document.getElementById('errorMsg').textContent = '✗ 내용을 입력하세요';
                document.getElementById('errorMsg').classList.add('show');
                return;
            }

            const dateStr = document.getElementById('taskDate').value || formatDate(new Date());
            
            const taskData = {
                user_id: '00000000-0000-0000-0000-000000000000',
                title,
                description: document.getElementById('taskDesc').value || null,
                date: dateStr,
                category: selectedCategory,
                sub_category: selectedSubCategory || null,
                priority: null,
                completed: false,
                due_date: document.getElementById('dueDate').value || null,
                due_date_time: document.getElementById('dueTime').value || null,
                start_time: document.getElementById('startTime').value || null,
                end_time: document.getElementById('endTime').value || null,
                location: document.getElementById('location').value || null,
                relation: document.getElementById('relation').value || null,
                team_shared: document.getElementById('teamShare').checked || false,
                status: null
            };

            // ✅ 수정 모드 확인
            if (window.editingTaskId) {
                const editId = window.editingTaskId;  // ← 먼저 저장!

                // 로컬 배열 업데이트
                const taskIndex = allTasks.findIndex(t => t.id === editId);
                if (taskIndex !== -1) {
                    allTasks[taskIndex] = {
                        ...allTasks[taskIndex],
                        ...taskData
                    };
                }

                renderCalendar();
                renderTasks();
                document.getElementById('successMsg').classList.add('show');

                setTimeout(() => {
                    closeAddModal();  // closeAddModal이 editingTaskId를 null로 초기화함

                    // Supabase 업데이트 (editId 사용 - null 아님)
                    if (sbClient) {
                        sbClient.from('tasks').update(taskData).eq('id', editId).then(() => {
                            console.log('✓ 수정 완료');
                            loadTasks();
                            renderCalendar();
                            renderTasks();
                        }).catch(error => {
                            console.log('⚠️ 수정 오류:', error.message);
                        });
                    }
                }, 1000);
            } else {
                // 새로운 항목 추가
                const newTask = {
                    ...taskData,
                    created_at: new Date().toISOString()
                };

                // ✅ 반복 일정 처리
                const repeatTasks = generateRepeatTasks(newTask, dateStr);

                repeatTasks.forEach(t => {
                    allTasks.push({ id: 'temp_' + Date.now() + '_' + t.date, ...t });
                });

                renderCalendar();
                renderTasks();
                document.getElementById('successMsg').classList.add('show');

                setTimeout(() => {
                    closeAddModal();
                    checkDueAlerts();

                    if (sbClient) {
                        sbClient.from('tasks').insert(repeatTasks).then(() => {
                            console.log('✓ Supabase 저장 성공 (' + repeatTasks.length + '건)');
                            loadTasks().then(() => { renderCalendar(); renderTasks(); checkDueAlerts(); });
                        }).catch(error => {
                            console.log('⚠️ Supabase 저장 오류:', error.message);
                        });
                    }
                }, 1000);
            }
        }

        function toggleTask(id, completed) {
            const task = allTasks.find(t => t.id === id);
            if (task) {
                task.completed = completed;
                renderTasks();
            }
        }

        // ===== 상세 모달 함수 =====
        let selectedTaskId = null;

        function openDetailModal(taskId) {
            const task = allTasks.find(t => t.id === taskId);
            if (!task) return;

            selectedTaskId = taskId;

            // 상세 정보 표시
            document.getElementById('detailTitle').textContent = task.title;
            document.getElementById('detailCategory').textContent = getCategoryLabel(task.category);
            
            const subCatSpan = document.getElementById('detailSubCategory');
            if (task.sub_category) {
                subCatSpan.textContent = task.sub_category;
                subCatSpan.style.display = 'inline-block';
            } else {
                subCatSpan.style.display = 'none';
            }

            document.getElementById('detailContent').textContent = task.title;

            const descItem = document.getElementById('detailDescItem');
            if (task.description) {
                document.getElementById('detailDesc').textContent = task.description;
                descItem.style.display = 'block';
            } else {
                descItem.style.display = 'none';
            }

            document.getElementById('detailDate').textContent = task.date;

            document.getElementById('detailModal').classList.add('open');
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('open');
            selectedTaskId = null;
        }

        function editTask() {
            const task = allTasks.find(t => t.id === selectedTaskId);
            if (!task) return;

            // ✅ editingTaskId를 먼저 설정 (closeDetailModal 전에!)
            window.editingTaskId = selectedTaskId;

            closeDetailModal();  // 이제 selectedTaskId가 null이 돼도 괜찮음

            // 추가 모달에 데이터 입력
            selectedCategory = task.category;
            selectedSubCategory = task.sub_category || '';

            document.getElementById('modalTitle').textContent = '할일 수정';
            document.getElementById('taskTitle').value = task.title;
            document.getElementById('taskDesc').value = task.description || '';

            // ✅ 날짜 하루 차이 버그 수정 (valueAsDate 대신 직접 value 사용)
            document.getElementById('taskDate').value = task.date;

            // ✅ 마감일자/시간 복원
            document.getElementById('dueDate').value = task.due_date || '';
            document.getElementById('dueTime').value = task.due_date_time || '';

            // ✅ 시작/종료 시간 복원
            document.getElementById('startTime').value = task.start_time || '';
            document.getElementById('endTime').value = task.end_time || '';

            // ✅ 장소/관계 복원
            document.getElementById('location').value = task.location || '';
            document.getElementById('relation').value = task.relation || '';

            document.getElementById('successMsg').classList.remove('show');
            document.getElementById('errorMsg').classList.remove('show');

            renderCategoryButtons();
            renderSubCategoryButtons();
            updateFormFields();

            document.getElementById('addModal').classList.add('open');
        }

        function deleteTask() {
            if (!selectedTaskId) return;

            if (!confirm('정말 삭제하시겠습니까?')) return;

            const deleteId = selectedTaskId;  // ← 먼저 저장
            closeDetailModal();

            // 로컬 배열에서 제거
            allTasks = allTasks.filter(t => t.id !== deleteId);

            // UI 업데이트
            renderCalendar();
            renderTasks();

            // Supabase에서 삭제
            if (sbClient) {
                if (deleteId.startsWith('temp_')) {
                    console.log('⚠️ 임시 id - DB에 없으므로 로컬만 삭제');
                } else {
                    sbClient.from('tasks').delete().eq('id', deleteId).then(() => {
                        console.log('✓ 삭제 완료');
                    }).catch(error => {
                        console.log('⚠️ 삭제 오류:', error.message);
                    });
                }
            }
        }

        function filterByCategory(category, el) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if (el) el.classList.add('active');
            renderTasks();
        }

        // ========================================
        // ✅ 반복 일정 함수
        // ========================================

        function selectRepeat(type, el) {
            selectedRepeat = type;
            document.querySelectorAll('.repeat-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('repeatEndGroup').style.display = type === 'none' ? 'none' : 'grid';
        }

        function generateRepeatTasks(baseTask, startDateStr) {
            const tasks = [];
            const created_at = new Date().toISOString();

            // ✅ 반복 없음: 단건만 반환
            if (selectedRepeat === 'none') {
                tasks.push({ ...baseTask, created_at });
                return tasks;
            }

            const endDateStr = document.getElementById('repeatEndDate').value;
            const repeatCountVal = document.getElementById('repeatCount').value;

            // ✅ 종료일도 없고 횟수도 없으면 단건만 저장
            if (!endDateStr && !repeatCountVal) {
                tasks.push({ ...baseTask, created_at });
                return tasks;
            }

            const maxCount = parseInt(repeatCountVal) || 10;
            const endDate = endDateStr ? new Date(endDateStr + 'T00:00:00') : null;
            let current = new Date(startDateStr + 'T00:00:00');
            let count = 0;
            let safetyLimit = 0;

            while (count < maxCount && safetyLimit < 366) {
                safetyLimit++;

                // 종료일 초과 시 중단
                if (endDate && current > endDate) break;

                const dateStr = current.toISOString().split('T')[0];

                // 평일마다: 토(6), 일(0) 제외
                if (selectedRepeat === 'weekday') {
                    const day = current.getDay();
                    if (day !== 0 && day !== 6) {
                        tasks.push({ ...baseTask, date: dateStr, created_at });
                        count++;
                    }
                } else {
                    tasks.push({ ...baseTask, date: dateStr, created_at });
                    count++;
                }

                // 다음 날짜 계산
                if (selectedRepeat === 'daily' || selectedRepeat === 'weekday') {
                    current.setDate(current.getDate() + 1);
                } else if (selectedRepeat === 'weekly') {
                    current.setDate(current.getDate() + 7);
                } else if (selectedRepeat === 'biweekly') {
                    current.setDate(current.getDate() + 14);
                } else if (selectedRepeat === 'monthly') {
                    current.setMonth(current.getMonth() + 1);
                } else {
                    break;
                }
            }

            return tasks;
        }

        // ========================================
        // ✅ 마감 임박 알림 함수
        // ========================================

        function checkDueAlerts() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const tomorrow = new Date(today);
            tomorrow.setDate(today.getDate() + 1);
            const dayAfter = new Date(today);
            dayAfter.setDate(today.getDate() + 2);

            const todayStr = today.toISOString().split('T')[0];
            const tomorrowStr = tomorrow.toISOString().split('T')[0];
            const dayAfterStr = dayAfter.toISOString().split('T')[0];

            // 미완료 + 마감일이 있는 항목
            const dueItems = allTasks.filter(t => {
                if (t.completed) return false;
                const due = t.due_date || t.date;
                return due && due <= dayAfterStr;
            });

            const banner = document.getElementById('dueBanner');
            const list = document.getElementById('dueList');

            if (dueItems.length === 0) {
                banner.classList.remove('show');
                return;
            }

            banner.classList.add('show');
            list.innerHTML = dueItems.map(t => {
                const due = t.due_date || t.date;
                let badgeClass = 'due-soon';
                let badgeText = '2일 후 마감';
                if (due === todayStr) { badgeClass = 'due-today'; badgeText = '오늘 마감'; }
                else if (due === tomorrowStr) { badgeClass = 'due-tomorrow'; badgeText = '내일 마감'; }
                else if (due < todayStr) { badgeClass = 'due-today'; badgeText = '기한 초과'; }

                return `<div class="due-item">
                    <span>${t.title}</span>
                    <span class="due-badge ${badgeClass}">${badgeText}</span>
                </div>`;
            }).join('');
        }

        // ========================================
        // ✅ 주간 리포트 함수
        // ========================================

        function openReportModal() {
            reportWeekStart = getMonday(new Date());
            renderReport();
            document.getElementById('reportModal').classList.add('open');
        }

        function closeReportModal() {
            document.getElementById('reportModal').classList.remove('open');
        }

        function reportPrevWeek() {
            reportWeekStart = new Date(reportWeekStart);
            reportWeekStart.setDate(reportWeekStart.getDate() - 7);
            renderReport();
        }

        function reportNextWeek() {
            reportWeekStart = new Date(reportWeekStart);
            reportWeekStart.setDate(reportWeekStart.getDate() + 7);
            renderReport();
        }

        function renderReport() {
            const weekEnd = new Date(reportWeekStart);
            weekEnd.setDate(reportWeekStart.getDate() + 6);

            const startStr = formatDate(reportWeekStart);
            const endStr = formatDate(weekEnd);

            document.getElementById('reportWeekLabel').textContent =
                `${reportWeekStart.getMonth()+1}월 ${reportWeekStart.getDate()}일 ~ ${weekEnd.getMonth()+1}월 ${weekEnd.getDate()}일`;

            // 해당 주 할일 필터
            const weekTasks = allTasks.filter(t => t.date >= startStr && t.date <= endStr);
            const total = weekTasks.length;
            const done = weekTasks.filter(t => t.completed).length;
            const rate = total > 0 ? Math.round(done / total * 100) : 0;

            document.getElementById('rTotal').textContent = total;
            document.getElementById('rDone').textContent = done;
            document.getElementById('rRate').textContent = rate + '%';

            // 카테고리별
            const cntWork = weekTasks.filter(t => t.category === 'work').length;
            const cntPersonal = weekTasks.filter(t => t.category === 'personal').length;
            const cntTeam = weekTasks.filter(t => t.category === 'team').length;
            const maxCnt = Math.max(cntWork, cntPersonal, cntTeam, 1);

            document.getElementById('barWork').style.width = (cntWork / maxCnt * 100) + '%';
            document.getElementById('barPersonal').style.width = (cntPersonal / maxCnt * 100) + '%';
            document.getElementById('barTeam').style.width = (cntTeam / maxCnt * 100) + '%';
            document.getElementById('cntWork').textContent = cntWork;
            document.getElementById('cntPersonal').textContent = cntPersonal;
            document.getElementById('cntTeam').textContent = cntTeam;

            // 할일 목록
            const catColors = { work: '#3B8BD4', personal: '#639922', team: '#D4537E' };
            document.getElementById('reportTaskList').innerHTML = weekTasks.length === 0
                ? '<div style="text-align:center;color:#aaa;padding:20px;">이번 주 할일이 없습니다</div>'
                : weekTasks.map(t => `
                    <div class="report-task-item">
                        <div class="report-task-dot" style="background:${catColors[t.category]||'#ccc'}"></div>
                        <span style="flex:1;font-size:11px;color:#888;">${t.date}</span>
                        <span class="${t.completed ? 'report-done' : ''}" style="flex:3;">${t.title}</span>
                        <span style="font-size:10px;color:#bbb;">${t.sub_category||''}</span>
                    </div>`).join('');
        }

        function exportReport() {
            const weekEnd = new Date(reportWeekStart);
            weekEnd.setDate(reportWeekStart.getDate() + 6);
            const startStr = formatDate(reportWeekStart);
            const endStr = formatDate(weekEnd);

            const weekTasks = allTasks.filter(t => t.date >= startStr && t.date <= endStr);
            const done = weekTasks.filter(t => t.completed).length;
            const rate = weekTasks.length > 0 ? Math.round(done / weekTasks.length * 100) : 0;

            let text = `📊 주간 업무 리포트\n`;
            text += `기간: ${startStr} ~ ${endStr}\n`;
            text += `완료율: ${done}/${weekTasks.length} (${rate}%)\n\n`;

            ['work', 'personal', 'team'].forEach(cat => {
                const items = weekTasks.filter(t => t.category === cat);
                if (items.length === 0) return;
                const label = { work: '업무', personal: '개인', team: '팀연동' }[cat];
                text += `[${label}]\n`;
                items.forEach(t => {
                    text += `  ${t.completed ? '✅' : '⬜'} ${t.date} ${t.title}${t.sub_category ? ' (' + t.sub_category + ')' : ''}\n`;
                });
                text += '\n';
            });

            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert('📋 리포트가 클립보드에 복사되었습니다!');
        }

        // closeAddModal 초기화 시 반복 설정도 리셋
        const _origCloseAddModal = closeAddModal;

        window.onload = init;
    </script>

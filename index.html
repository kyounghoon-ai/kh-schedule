<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 업무 관리</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: white;
            border-bottom: 1px solid #e5e5e5;
            padding: 20px 0;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 20px;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .view-toggle {
            display: flex;
            gap: 8px;
        }

        button {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        button.active {
            background: #3B8BD4;
            color: white;
            border-color: #3B8BD4;
        }

        .legend {
            display: flex;
            gap: 20px;
            padding: 0 20px;
            font-size: 12px;
            color: #666;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        .color-work { background-color: #3B8BD4; }
        .color-personal { background-color: #639922; }
        .color-team { background-color: #D4537E; }

        .main-layout {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 20px;
            min-height: 700px;
        }

        .calendar-section, .task-section {
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #e5e5e5;
        }

        .week-nav {
            font-size: 14px;
            font-weight: 500;
        }

        .nav-btn {
            padding: 6px 12px;
            margin: 0 8px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .month-grid {
            display: none;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            padding: 20px;
            flex: 1;
            overflow-y: auto;
            background: #e5e5e5;
        }

        .month-grid.active {
            display: grid;
        }

        .week-day-header {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .week-day-header.saturday {
            color: #3B8BD4;
            font-weight: 700;
        }

        .week-day-header.sunday {
            color: #d32f2f;
            font-weight: 700;
        }

        .day-cell {
            background: #fafafa;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            padding: 8px;
            min-height: 120px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }

        .day-cell:hover {
            background: #f0f0f0;
        }

        .day-cell.selected {
            border: 2px solid #3B8BD4;
            background: #e6f1fb;
        }

        .day-cell.saturday {
            background: #e6f1fb;
        }

        .day-cell.sunday, .day-cell.holiday {
            background: #fcebeb;
        }

        .day-date {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 3px;
            color: #333;
        }

        .day-date.saturday {
            color: #3B8BD4;
        }

        .day-date.sunday {
            color: #d32f2f;
        }

        .day-holiday-name {
            font-size: 9px;
            color: #d32f2f;
            margin-bottom: 4px;
            font-weight: 500;
            line-height: 1.2;
        }

        .day-events {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            overflow: hidden;
        }

        .event-badge {
            font-size: 10px;
            padding: 2px 4px;
            border-radius: 2px;
            color: white;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
        }

        .event-badge.work { background-color: #3B8BD4; }
        .event-badge.personal { background-color: #639922; }
        .event-badge.team { background-color: #D4537E; }

        .month-day {
            background: white;
            padding: 8px;
            min-height: 100px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }

        .month-day:hover {
            background: #f0f0f0;
        }

        .month-day.selected {
            background: #e6f1fb;
            border: 2px solid #3B8BD4;
        }

        .month-day.other-month {
            background: #f9f9f9;
            color: #ccc;
        }

        .month-day.saturday {
            background: #f5f9ff;
        }

        .month-day.sunday {
            background: #fff8f8;
        }

        .month-date {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .month-date.saturday {
            color: #3B8BD4;
        }

        .month-date.sunday {
            color: #d32f2f;
        }

        .month-events {
            font-size: 9px;
            color: #666;
            overflow: hidden;
        }

        .month-event-dot {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            margin-right: 2px;
        }

        .task-header {
            padding: 20px;
            border-bottom: 1px solid #e5e5e5;
        }

        .selected-date {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
        }

        .selected-date-value {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .add-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        .add-btn {
            padding: 10px;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .add-btn.work { background: #3B8BD4; }
        .add-btn.personal { background: #639922; }
        .add-btn.team { background: #D4537E; }

        .add-btn:hover {
            opacity: 0.9;
        }

        .task-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .task-list-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            color: #333;
        }

        .task-counter {
            font-weight: 400;
            color: #999;
            font-size: 12px;
        }

        .task-list {
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            overflow: hidden;
        }

        .task-item {
            padding: 12px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            gap: 10px;
            align-items: center;
            cursor: pointer;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item:hover {
            background: #f9f9f9;
        }

        .task-item input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .task-text {
            flex: 1;
            font-size: 13px;
        }

        .task-item input[type="checkbox"]:checked + .task-text {
            text-decoration: line-through;
            color: #999;
        }

        .task-info {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .task-category {
            font-size: 10px;
            padding: 3px 6px;
            border-radius: 3px;
            color: white;
            white-space: nowrap;
        }

        .task-category.work { background-color: #3B8BD4; }
        .task-category.personal { background-color: #639922; }
        .task-category.team { background-color: #D4537E; }

        .task-subcategory {
            font-size: 10px;
            padding: 3px 6px;
            border-radius: 3px;
            background: #f0f0f0;
            color: #666;
            white-space: nowrap;
        }

        .filter-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e5e5;
        }

        .filter-title {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .filter-btn {
            padding: 4px 12px;
            font-size: 12px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
        }

        .filter-btn.active {
            background: #3B8BD4;
            color: white;
            border-color: #3B8BD4;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 13px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
        }

        .modal-overlay.open {
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .modal {
            background: white;
            border-radius: 16px 16px 0 0;
            width: 100%;
            max-width: 560px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px 20px 40px;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: #3B8BD4;
            box-shadow: 0 0 0 3px rgba(59,139,212,0.1);
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .category-btn {
            padding: 12px;
            border: 1.5px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
        }

        .category-btn:hover {
            border-color: #3B8BD4;
        }

        .category-btn.selected {
            color: white;
            border-color: white;
        }

        .category-btn.work.selected {
            background: #3B8BD4;
        }

        .category-btn.personal.selected {
            background: #639922;
        }

        .category-btn.team.selected {
            background: #D4537E;
        }

        .sub-category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .sub-category-btn {
            padding: 10px;
            border: 1.5px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
            transition: all 0.2s;
        }

        .sub-category-btn:hover {
            border-color: #999;
            background: #f9f9f9;
        }

        .sub-category-btn.selected {
            color: white;
            border: none;
            font-weight: 600;
            transform: scale(1.05);
        }

        .sub-category-btn.work.selected {
            background: #3B8BD4;
            box-shadow: 0 4px 12px rgba(59, 139, 212, 0.4);
        }

        .sub-category-btn.personal.selected {
            background: #639922;
            box-shadow: 0 4px 12px rgba(99, 153, 34, 0.4);
        }

        .sub-category-btn.team.selected {
            background: #D4537E;
            box-shadow: 0 4px 12px rgba(212, 83, 126, 0.4);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel {
            background: #e5e5e5;
            color: #333;
        }

        .btn-save {
            background: #3B8BD4;
            color: white;
        }

        .btn-save:hover {
            background: #2a6ba0;
        }

        .date-time-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .message-box {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            font-weight: 500;
            display: none;
            border-left: 4px solid;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            border-left-color: #2e7d32;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            border-left-color: #c62828;
        }

        .message-box.show {
            display: block;
        }

        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>나의 업무 관리</h1>
                <div class="view-toggle">
                    <button class="active" id="weekBtn" onclick="switchView('week')">주간</button>
                    <button id="monthBtn" onclick="switchView('month')">월간</button>
                </div>
            </div>
            <div class="legend">
                <div class="legend-item"><div class="legend-color color-work"></div><span>업무</span></div>
                <div class="legend-item"><div class="legend-color color-personal"></div><span>개인</span></div>
                <div class="legend-item"><div class="legend-color color-team"></div><span>팀연동</span></div>
            </div>
        </header>

        <div class="main-layout">
            <div class="calendar-section">
                <div class="calendar-header">
                    <div class="week-nav">
                        <button class="nav-btn" onclick="previousPeriod()">←</button>
                        <span id="periodDisplay"></span>
                        <button class="nav-btn" onclick="nextPeriod()">→</button>
                    </div>
                </div>
                <div class="week-grid" id="calendarGrid"></div>
                <div class="month-grid" id="monthGrid"></div>
            </div>

            <div class="task-section">
                <div class="task-header">
                    <div class="selected-date">선택됨</div>
                    <div class="selected-date-value" id="selectedDateDisplay">오늘</div>
                    <div class="add-buttons">
                        <button class="add-btn work" onclick="openAddModal('work')">업무</button>
                        <button class="add-btn personal" onclick="openAddModal('personal')">개인</button>
                        <button class="add-btn team" onclick="openAddModal('team')">팀연동</button>
                    </div>
                </div>

                <div class="task-content">
                    <div class="task-list-title">할일 목록 <span class="task-counter" id="taskCounter">0/0</span></div>
                    <div class="task-list" id="taskList"></div>

                    <div class="filter-section">
                        <div class="filter-title">분류 필터</div>
                        <div class="filter-buttons">
                            <button class="filter-btn active" onclick="filterByCategory('all')">전체</button>
                            <button class="filter-btn" onclick="filterByCategory('work')">업무</button>
                            <button class="filter-btn" onclick="filterByCategory('personal')">개인</button>
                            <button class="filter-btn" onclick="filterByCategory('team')">팀연동</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <div class="modal-title" id="modalTitle">할일 추가</div>

            <div class="message-box success-message" id="successMsg">✓ 저장되었습니다!</div>
            <div class="message-box error-message" id="errorMsg"></div>

            <div class="form-group">
                <label class="form-label">분류</label>
                <div class="category-grid" id="categoryGrid"></div>
            </div>

            <div class="form-group" id="subCategoryGroup" style="display: none;">
                <label class="form-label">세부 분류</label>
                <div class="sub-category-grid" id="subCategoryGrid"></div>
            </div>

            <div class="form-group">
                <label class="form-label">내용 *</label>
                <input type="text" class="form-control" id="taskTitle" placeholder="내용을 입력하세요">
            </div>

            <div class="form-group">
                <label class="form-label">세부사항</label>
                <textarea class="form-control" id="taskDesc" placeholder="세부사항을 입력하세요" style="min-height: 80px; resize: vertical;"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">날짜</label>
                <input type="date" class="form-control" id="taskDate">
            </div>

            <div class="date-time-group" id="timeGroup" style="display: none;">
                <div class="form-group">
                    <label class="form-label">시작 시간</label>
                    <input type="time" class="form-control" id="startTime">
                </div>
                <div class="form-group">
                    <label class="form-label">종료 시간</label>
                    <input type="time" class="form-control" id="endTime">
                </div>
            </div>

            <div class="date-time-group" id="dueTimeGroup" style="display: none;">
                <div class="form-group">
                    <label class="form-label">마감일자</label>
                    <input type="date" class="form-control" id="dueDate">
                </div>
                <div class="form-group">
                    <label class="form-label">마감시간</label>
                    <input type="time" class="form-control" id="dueTime">
                </div>
            </div>

            <div class="form-group" id="locationGroup" style="display: none;">
                <label class="form-label">장소</label>
                <input type="text" class="form-control" id="location" placeholder="장소를 입력하세요">
            </div>

            <div class="form-group" id="relationGroup" style="display: none;">
                <label class="form-label">관계</label>
                <select class="form-control" id="relation">
                    <option value="">선택하세요</option>
                    <option value="friend">지인</option>
                    <option value="colleague">동료</option>
                    <option value="family">가족</option>
                </select>
            </div>

            <div class="form-group" id="teamShareGroup" style="display: none;">
                <label class="form-label">
                    <input type="checkbox" id="teamShare"> 상품기획팀 캘린더에 공유
                </label>
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeAddModal()">취소</button>
                <button class="btn-save" id="saveBtn" onclick="saveTask()">저장</button>
            </div>
        </div>
    </div>

    <script>
        const koreanHolidays = {
            '2026-01-01': '신정', '2026-01-29': '설날', '2026-01-30': '설날', '2026-02-02': '대체공휴일',
            '2026-03-01': '삼일절', '2026-05-05': '어린이날', '2026-05-06': '대체공휴일',
            '2026-05-24': '부처님오탄신일', '2026-06-06': '현충일', '2026-08-15': '광복절',
            '2026-09-28': '추석', '2026-09-29': '추석', '2026-09-30': '추석',
            '2026-10-03': '개천절', '2026-10-09': '한글날', '2026-12-25': '크리스마스',
        };

        const subCategories = {
            work: ['자료요청', '자료제출', '메일회신', '업무지시', '보고', '회의', '기타'],
            personal: ['점심', '저녁', '행사', '운동', '기타'],
            team: ['회의', '교육', '행사', '공지', '기타']
        };

        const SUPABASE_URL = 'https://srcnsotfcwwvqwejfitl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNyY25zb3RmY3d3dnF3ZWpmaXRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExOTU3MTksImV4cCI6MjA5Njc3MTcxOX0.153tZC9Tkg8cP4lfzzUnRaoX5rsDT0uXU3X128p-ovU';
        
        let sbClient = null;
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let currentWeekStart = getMonday(new Date());
        let selectedDate = new Date();
        let allTasks = [];  // ← 하나의 배열만 사용
        let currentFilter = 'all';
        let currentView = 'week';
        let selectedCategory = 'work';
        let selectedSubCategory = '';

        async function init() {
            try {
                sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                console.log('✓ Supabase 연결됨');
                await loadTasks();
            } catch (e) {
                console.error('❌ 초기화 오류:', e.message);
            }
            
            setDefaultDate();
            renderCalendar();
            renderTasks();
            updateSelectedDateDisplay();
        }

        function setDefaultDate() {
            const today = new Date();
            document.getElementById('taskDate').valueAsDate = today;
        }

        function switchView(view) {
            currentView = view;
            document.getElementById('weekBtn').classList.remove('active');
            document.getElementById('monthBtn').classList.remove('active');
            document.getElementById('calendarGrid').style.display = 'none';
            document.getElementById('monthGrid').classList.remove('active');
            
            if (view === 'week') {
                document.getElementById('weekBtn').classList.add('active');
                document.getElementById('calendarGrid').style.display = 'grid';
                currentWeekStart = getMonday(selectedDate);
            } else {
                document.getElementById('monthBtn').classList.add('active');
                document.getElementById('monthGrid').classList.add('active');
            }
            
            renderCalendar();
        }

        function getMonday(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        function formatDate(date, format = 'YYYY-MM-DD') {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const dayOfWeek = ['일', '월', '화', '수', '목', '금', '토'][date.getDay()];
            
            if (format === 'YYYY-MM-DD') return `${year}-${month}-${day}`;
            if (format === 'FULL') return `${month}월 ${day}일 (${dayOfWeek})`;
        }

        function getWeekDays(startDate) {
            const days = [];
            for (let i = 0; i < 7; i++) {
                const date = new Date(startDate);
                date.setDate(startDate.getDate() + i);
                days.push(date);
            }
            return days;
        }

        function previousPeriod() {
            if (currentView === 'week') {
                currentWeekStart.setDate(currentWeekStart.getDate() - 7);
            } else {
                currentMonth--;
                if (currentMonth < 0) {
                    currentMonth = 11;
                    currentYear--;
                }
            }
            renderCalendar();
        }

        function nextPeriod() {
            if (currentView === 'week') {
                currentWeekStart.setDate(currentWeekStart.getDate() + 7);
            } else {
                currentMonth++;
                if (currentMonth > 11) {
                    currentMonth = 0;
                    currentYear++;
                }
            }
            renderCalendar();
        }

        async function loadTasks() {
            try {
                if (!sbClient) return;
                const { data, error } = await sbClient
                    .from('tasks')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                allTasks = data || [];
                console.log('✓ tasks 로드됨:', allTasks.length + '개');
            } catch (e) {
                console.log('⚠️ Tasks 로드 오류:', e.message);
            }
        }

        function renderCalendar() {
            if (currentView === 'week') {
                renderWeekCalendar();
            } else {
                renderMonthCalendar();
            }
        }

        function renderWeekCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            const weekDays = getWeekDays(currentWeekStart);
            const weekEnd = new Date(currentWeekStart);
            weekEnd.setDate(weekEnd.getDate() + 6);
            
            document.getElementById('periodDisplay').textContent = 
                `${formatDate(currentWeekStart, 'YYYY-MM-DD').split('-')[1]}월 ${currentWeekStart.getDate()}-${weekEnd.getDate()}`;

            const dayNames = ['월', '화', '수', '목', '금', '토', '일'];
            dayNames.forEach((day, idx) => {
                const header = document.createElement('div');
                header.className = 'week-day-header';
                if (idx === 5) header.classList.add('saturday');
                if (idx === 6) header.classList.add('sunday');
                header.textContent = day;
                grid.appendChild(header);
            });

            weekDays.forEach((date, idx) => {
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                
                if (idx === 5) cell.classList.add('saturday');
                if (idx === 6) cell.classList.add('sunday');
                
                const dateStr = formatDate(date);
                if (koreanHolidays[dateStr]) {
                    cell.classList.add('holiday');
                }
                
                if (dateStr === formatDate(selectedDate)) {
                    cell.classList.add('selected');
                }
                
                cell.onclick = () => selectDate(date);

                const dateNum = String(date.getDate()).padStart(2, '0');
                let html = `<div class="day-date`;
                if (idx === 5) html += ' saturday';
                if (idx === 6 || koreanHolidays[dateStr]) html += ' sunday';
                html += `">${dateNum}</div>`;
                
                if (koreanHolidays[dateStr]) {
                    html += `<div class="day-holiday-name">${koreanHolidays[dateStr]}</div>`;
                }
                
                html += '<div class="day-events"></div>';
                cell.innerHTML = html;

                // ✅ allTasks에서 일정 가져오기
                const dayTasks = allTasks.filter(t => t.date === dateStr);
                const eventsContainer = cell.querySelector('.day-events');
                dayTasks.forEach(task => {
                    const badge = document.createElement('div');
                    badge.className = `event-badge ${task.category}`;
                    badge.textContent = task.title;
                    eventsContainer.appendChild(badge);
                });

                grid.appendChild(cell);
            });
        }

        function renderMonthCalendar() {
            const grid = document.getElementById('monthGrid');
            grid.innerHTML = '';

            document.getElementById('periodDisplay').textContent = `${currentYear}년 ${currentMonth + 1}월`;

            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            dayNames.forEach(day => {
                const header = document.createElement('div');
                header.style.background = '#f5f5f5';
                header.style.fontWeight = '600';
                header.style.textAlign = 'center';
                header.style.padding = '8px';
                header.textContent = day;
                grid.appendChild(header);
            });

            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            const prevLastDay = new Date(currentYear, currentMonth, 0);
            
            const startDate = firstDay.getDay();
            const endDate = lastDay.getDate();
            const prevEndDate = prevLastDay.getDate();

            for (let i = startDate - 1; i >= 0; i--) {
                const day = document.createElement('div');
                day.className = 'month-day other-month';
                day.textContent = prevEndDate - i;
                grid.appendChild(day);
            }

            for (let i = 1; i <= endDate; i++) {
                const day = document.createElement('div');
                const dateObj = new Date(currentYear, currentMonth, i);
                const dateStr = formatDate(dateObj);
                
                day.className = 'month-day';
                
                if (dateObj.getDay() === 5) day.classList.add('saturday');
                if (dateObj.getDay() === 0) day.classList.add('sunday');
                if (koreanHolidays[dateStr]) day.classList.add('sunday');
                
                if (dateStr === formatDate(selectedDate)) {
                    day.classList.add('selected');
                }
                
                day.onclick = () => selectDate(dateObj);
                
                const dateNum = document.createElement('div');
                dateNum.className = 'month-date';
                if (dateObj.getDay() === 5) dateNum.classList.add('saturday');
                if (dateObj.getDay() === 0 || koreanHolidays[dateStr]) dateNum.classList.add('sunday');
                dateNum.textContent = i;
                day.appendChild(dateNum);

                // ✅ allTasks에서 일정 가져오기
                const dayTasks = allTasks.filter(t => t.date === dateStr);
                if (dayTasks.length > 0) {
                    const eventsDiv = document.createElement('div');
                    eventsDiv.className = 'month-events';
                    dayTasks.forEach(t => {
                        const dot = document.createElement('span');
                        dot.className = 'month-event-dot';
                        dot.style.background = t.category === 'work' ? '#3B8BD4' : t.category === 'personal' ? '#639922' : '#D4537E';
                        eventsDiv.appendChild(dot);
                    });
                    day.appendChild(eventsDiv);
                }

                grid.appendChild(day);
            }

            for (let i = 1; i <= (42 - startDate - endDate); i++) {
                const day = document.createElement('div');
                day.className = 'month-day other-month';
                day.textContent = i;
                grid.appendChild(day);
            }
        }

        function selectDate(date) {
            selectedDate = new Date(date);
            renderCalendar();
            renderTasks();
            updateSelectedDateDisplay();
            document.getElementById('taskDate').valueAsDate = selectedDate;
        }

        function updateSelectedDateDisplay() {
            document.getElementById('selectedDateDisplay').textContent = formatDate(selectedDate, 'FULL');
        }

        function renderTasks() {
            const selectedDateStr = formatDate(selectedDate);
            let tasksToShow = allTasks.filter(t => t.date === selectedDateStr);

            if (currentFilter !== 'all') {
                tasksToShow = tasksToShow.filter(t => t.category === currentFilter);
            }

            const taskList = document.getElementById('taskList');
            const completed = tasksToShow.filter(t => t.completed).length;
            const total = allTasks.filter(t => t.date === selectedDateStr).length;

            document.getElementById('taskCounter').textContent = `${completed}/${total}`;

            if (tasksToShow.length === 0) {
                taskList.innerHTML = '<div class="empty-state">할일이 없습니다</div>';
                return;
            }

            taskList.innerHTML = tasksToShow.map(task => `
                <div class="task-item">
                    <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask('${task.id}', this.checked);">
                    <span class="task-text">${task.title}</span>
                    <div class="task-info">
                        <span class="task-category ${task.category}">${getCategoryLabel(task.category)}</span>
                        ${task.sub_category ? `<span class="task-subcategory">${task.sub_category}</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function getCategoryLabel(cat) {
            const labels = { work: '업무', personal: '개인', team: '팀연동' };
            return labels[cat] || cat;
        }

        function openAddModal(category) {
            selectedCategory = category;
            selectedSubCategory = '';
            
            document.getElementById('modalTitle').textContent = category === 'work' ? '업무 추가' : category === 'personal' ? '개인 추가' : '팀연동 추가';
            document.getElementById('successMsg').classList.remove('show');
            document.getElementById('errorMsg').classList.remove('show');
            
            clearFormFields();
            renderCategoryButtons();
            renderSubCategoryButtons();
            updateFormFields();
            
            document.getElementById('addModal').classList.add('open');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('open');
        }

        function clearFormFields() {
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDesc').value = '';
            document.getElementById('startTime').value = '';
            document.getElementById('endTime').value = '';
            document.getElementById('location').value = '';
            document.getElementById('dueDate').value = '';
            document.getElementById('dueTime').value = '';
            document.getElementById('relation').value = '';
            document.getElementById('teamShare').checked = false;
        }

        function renderCategoryButtons() {
            const grid = document.getElementById('categoryGrid');
            grid.innerHTML = '';
            ['work', 'personal', 'team'].forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `category-btn ${cat} ${cat === selectedCategory ? 'selected' : ''}`;
                btn.textContent = getCategoryLabel(cat);
                btn.onclick = (e) => { selectMainCategory(cat); };
                grid.appendChild(btn);
            });
        }

        function selectMainCategory(cat) {
            selectedCategory = cat;
            selectedSubCategory = '';
            renderCategoryButtons();
            renderSubCategoryButtons();
            updateFormFields();
        }

        function renderSubCategoryButtons() {
            const options = subCategories[selectedCategory] || [];
            const grid = document.getElementById('subCategoryGrid');
            grid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = `sub-category-btn ${selectedCategory} ${opt === selectedSubCategory ? 'selected' : ''}`;
                btn.textContent = opt;
                btn.type = 'button';
                btn.onclick = (e) => { 
                    selectSubCategory(opt);
                    return false;
                };
                grid.appendChild(btn);
            });
        }

        function selectSubCategory(subCat) {
            selectedSubCategory = subCat;
            renderSubCategoryButtons();
            updateFormFields();
        }

        function updateFormFields() {
            document.getElementById('subCategoryGroup').style.display = 'block';
            
            document.getElementById('locationGroup').style.display = 'none';
            document.getElementById('relationGroup').style.display = 'none';
            document.getElementById('teamShareGroup').style.display = 'none';
            document.getElementById('timeGroup').style.display = 'none';
            document.getElementById('dueTimeGroup').style.display = 'none';

            if (selectedCategory === 'work') {
                if (['자료요청', '자료제출', '메일회신', '업무지시'].includes(selectedSubCategory)) {
                    document.getElementById('dueTimeGroup').style.display = 'grid';
                }
                else if (['보고', '회의'].includes(selectedSubCategory)) {
                    document.getElementById('timeGroup').style.display = 'grid';
                }
            } 
            else if (selectedCategory === 'personal') {
                if (selectedSubCategory === '행사') {
                    document.getElementById('timeGroup').style.display = 'grid';
                    document.getElementById('locationGroup').style.display = 'block';
                }
                else if (['점심', '저녁'].includes(selectedSubCategory)) {
                    document.getElementById('timeGroup').style.display = 'grid';
                }
                else if (selectedSubCategory === '운동') {
                    document.getElementById('timeGroup').style.display = 'grid';
                    document.getElementById('locationGroup').style.display = 'block';
                }
                document.getElementById('relationGroup').style.display = 'block';
            }
            else if (selectedCategory === 'team') {
                if (['회의', '교육', '행사'].includes(selectedSubCategory)) {
                    document.getElementById('timeGroup').style.display = 'grid';
                    document.getElementById('locationGroup').style.display = 'block';
                }
                document.getElementById('teamShareGroup').style.display = 'block';
            }
        }

        function saveTask() {
            const title = document.getElementById('taskTitle').value.trim();
            
            if (!title) {
                document.getElementById('errorMsg').textContent = '✗ 내용을 입력하세요';
                document.getElementById('errorMsg').classList.add('show');
                return;
            }

            const dateStr = formatDate(document.getElementById('taskDate').valueAsDate || new Date());
            
            // ✅ id 제외 (Supabase가 자동으로 UUID 생성)
            const newTask = {
                user_id: '00000000-0000-0000-0000-000000000000',  // 임시 사용자 ID
                title,
                description: document.getElementById('taskDesc').value || null,
                date: dateStr,
                category: selectedCategory,
                sub_category: selectedSubCategory || null,
                priority: null,
                completed: false,
                due_date: null,
                due_date_time: null,
                status: null,
                created_at: new Date().toISOString()
            };

            // ✅ 로컬 배열에는 임시 id 추가 (UI 표시용)
            const taskWithId = {
                id: 'temp_' + Date.now().toString(),
                ...newTask
            };
            allTasks.push(taskWithId);

            // ✅ UI 즉시 업데이트
            renderCalendar();
            renderTasks();

            // ✅ 성공 메시지 표시
            document.getElementById('successMsg').classList.add('show');

            // ✅ 1초 후 모달 닫기
            setTimeout(() => {
                closeAddModal();
                
                // Supabase 저장 (id 없이 - UUID 자동생성)
                if (sbClient) {
                    console.log('📡 Supabase 저장 시작...');
                    sbClient.from('tasks').insert([newTask]).then(result => {
                        console.log('✓ Supabase 저장 성공');
                        // 데이터 다시 로드 (UUID 포함)
                        loadTasks();
                        renderCalendar();
                        renderTasks();
                    }).catch(error => {
                        console.log('⚠️ Supabase 저장 오류:', error.message);
                    });
                }
            }, 1000);
        }

        function toggleTask(id, completed) {
            const task = allTasks.find(t => t.id === id);
            if (task) {
                task.completed = completed;
                renderTasks();
            }
        }

        function filterByCategory(category) {
            currentFilter = category;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderTasks();
        }

        window.onload = init;
    </script>
</body>
</html>

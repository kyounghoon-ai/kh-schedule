<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 업무 관리</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            background: white;
            border-bottom: 1px solid #e5e5e5;
            padding: 20px 0;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 20px;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .view-toggle {
            display: flex;
            gap: 8px;
        }

        button {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        button.active {
            background: #3B8BD4;
            color: white;
            border-color: #3B8BD4;
        }

        button:hover:not(.active) {
            background: #f5f5f5;
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 20px;
            padding: 0 20px;
            font-size: 12px;
            color: #666;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        .color-work { background-color: #3B8BD4; }
        .color-personal { background-color: #639922; }
        .color-team { background-color: #D4537E; }

        /* Main Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 20px;
            height: 800px;
        }

        .calendar-section, .task-section {
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
        }

        /* Calendar */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #e5e5e5;
        }

        .week-nav {
            font-size: 14px;
            font-weight: 500;
        }

        .nav-btn {
            padding: 6px 12px;
            margin: 0 8px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .week-day-header {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .day-cell {
            background: #fafafa;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            padding: 10px;
            min-height: 140px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .day-cell:hover {
            background: #f0f0f0;
        }

        .day-cell.selected {
            border: 2px solid #3B8BD4;
        }

        .day-date {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        .day-events {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .event-badge {
            font-size: 11px;
            padding: 3px 6px;
            border-radius: 3px;
            color: white;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .event-badge:hover {
            opacity: 0.8;
        }

        .event-badge.work { background-color: #3B8BD4; }
        .event-badge.personal { background-color: #639922; }
        .event-badge.team { background-color: #D4537E; }

        /* Task Section */
        .task-header {
            padding: 20px;
            border-bottom: 1px solid #e5e5e5;
        }

        .selected-date {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
        }

        .selected-date-value {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .quick-add {
            display: flex;
            gap: 8px;
        }

        .quick-add input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
        }

        .quick-add button {
            padding: 8px 16px;
            background: #3B8BD4;
            color: white;
            border: 1px solid #3B8BD4;
        }

        .quick-add button:hover {
            background: #2a6fa8;
        }

        /* Task List */
        .task-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .task-list-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            color: #333;
        }

        .task-counter {
            font-weight: 400;
            color: #999;
            font-size: 12px;
        }

        .task-list {
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            overflow: hidden;
        }

        .task-item {
            padding: 12px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            gap: 10px;
            align-items: center;
            transition: background 0.2s;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item:hover {
            background: #f9f9f9;
        }

        .task-item input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .task-text {
            flex: 1;
            font-size: 13px;
            transition: all 0.2s;
        }

        .task-item input[type="checkbox"]:checked + .task-text {
            text-decoration: line-through;
            color: #999;
        }

        .task-category {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 3px;
            color: white;
            white-space: nowrap;
        }

        .task-category.work { background-color: #3B8BD4; }
        .task-category.personal { background-color: #639922; }
        .task-category.team { background-color: #D4537E; }

        .task-delete {
            width: 28px;
            height: 28px;
            padding: 4px;
            background: transparent;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .task-delete:hover {
            background: #fee;
            color: #d32f2f;
        }

        /* Filter */
        .filter-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e5e5;
        }

        .filter-title {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .filter-btn {
            padding: 4px 12px;
            font-size: 12px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: #3B8BD4;
            color: white;
            border-color: #3B8BD4;
        }

        .filter-btn:hover:not(.active) {
            background: #f5f5f5;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 13px;
        }

        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>나의 업무 관리</h1>
                <div class="view-toggle">
                    <button class="active" onclick="switchView('week')">주간</button>
                    <button onclick="switchView('month')">월간</button>
                </div>
            </div>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color color-work"></div>
                    <span>업무</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color color-personal"></div>
                    <span>개인</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color color-team"></div>
                    <span>팀연동</span>
                </div>
            </div>
        </header>

        <div class="main-layout">
            <!-- Calendar Section -->
            <div class="calendar-section">
                <div class="calendar-header">
                    <div class="week-nav">
                        <button class="nav-btn" onclick="previousWeek()">←</button>
                        <span id="weekDisplay"></span>
                        <button class="nav-btn" onclick="nextWeek()">→</button>
                    </div>
                </div>
                <div class="week-grid" id="weekGrid">
                    <div class="loading">로딩 중...</div>
                </div>
            </div>

            <!-- Task Section -->
            <div class="task-section">
                <div class="task-header">
                    <div class="selected-date">선택됨</div>
                    <div class="selected-date-value" id="selectedDateDisplay">오늘</div>
                    <div class="quick-add">
                        <input type="text" id="quickAddInput" placeholder="빠른 추가..." onkeypress="handleQuickAdd(event)">
                        <button onclick="addQuickTask()">+</button>
                    </div>
                </div>

                <div class="task-content">
                    <div class="task-list-title">
                        할일 목록
                        <span class="task-counter" id="taskCounter">0/0</span>
                    </div>
                    <div class="task-list" id="taskList">
                        <div class="empty-state">로딩 중...</div>
                    </div>

                    <div class="filter-section">
                        <div class="filter-title">분류 필터</div>
                        <div class="filter-buttons">
                            <button class="filter-btn active" onclick="filterByCategory('all')">전체</button>
                            <button class="filter-btn" onclick="filterByCategory('work')">업무</button>
                            <button class="filter-btn" onclick="filterByCategory('personal')">개인</button>
                            <button class="filter-btn" onclick="filterByCategory('team')">팀연동</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Supabase 초기화 (환경 변수로 설정 필요)
        const SUPABASE_URL = 'https://srcnsotfcwwvqwejfitl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNyY25zb3RmY3d3dnF3ZWpmaXRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExOTU3MTksImV4cCI6MjA5Njc3MTcxOX0.153tZC9Tkg8cP4lfzzUnRaoX5rsDT0uXU3X128p-ovU';
        let supabase = null;

        // 데이터
        let currentWeekStart = getMonday(new Date());
        let selectedDate = new Date();
        let allTasks = [];
        let allSchedules = [];
        let currentFilter = 'all';

        // 초기화
        async function init() {
            // Supabase 초기화 (연결된 경우)
            if (SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                // 데이터 로드
                await loadSchedules();
                await loadTasks();
            } else {
                // 로컬 스토리지 사용 (개발/테스트용)
                loadFromLocalStorage();
            }
            
            renderWeek();
            renderTasks();
        }

        // 유틸리티
        function getMonday(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        function formatDate(date, format = 'YYYY-MM-DD') {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const dayOfWeek = ['일', '월', '화', '수', '목', '금', '토'][date.getDay()];
            
            if (format === 'YYYY-MM-DD') return `${year}-${month}-${day}`;
            if (format === 'FULL') return `${month}월 ${day}일 (${dayOfWeek})`;
        }

        function getWeekDays(startDate) {
            const days = [];
            for (let i = 0; i < 7; i++) {
                const date = new Date(startDate);
                date.setDate(startDate.getDate() + i);
                days.push(date);
            }
            return days;
        }

        // 주간 네비게이션
        function previousWeek() {
            currentWeekStart.setDate(currentWeekStart.getDate() - 7);
            renderWeek();
        }

        function nextWeek() {
            currentWeekStart.setDate(currentWeekStart.getDate() + 7);
            renderWeek();
        }

        function switchView(view) {
            // 월간 뷰는 나중에 구현
            console.log('View:', view);
        }

        // Supabase 데이터 로드
        async function loadSchedules() {
            try {
                const { data, error } = await supabase
                    .from('schedules')
                    .select('*')
                    .order('date', { ascending: true });
                
                if (error) throw error;
                allSchedules = data || [];
            } catch (e) {
                console.log('Schedule load error:', e.message);
            }
        }

        async function loadTasks() {
            try {
                const { data, error } = await supabase
                    .from('tasks')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                allTasks = data || [];
            } catch (e) {
                console.log('Task load error:', e.message);
            }
        }

        // 로컬 스토리지 (개발용)
        function loadFromLocalStorage() {
            allSchedules = JSON.parse(localStorage.getItem('schedules') || '[]');
            allTasks = JSON.parse(localStorage.getItem('tasks') || '[]');
        }

        function saveToLocalStorage() {
            localStorage.setItem('schedules', JSON.stringify(allSchedules));
            localStorage.setItem('tasks', JSON.stringify(allTasks));
        }

        // 주간 렌더링
        function renderWeek() {
            const weekDays = getWeekDays(currentWeekStart);
            const weekEnd = new Date(currentWeekStart);
            weekEnd.setDate(weekEnd.getDate() + 6);
            
            document.getElementById('weekDisplay').textContent = 
                `${formatDate(currentWeekStart, 'YYYY-MM-DD').split('-')[1]}월 ${currentWeekStart.getDate()}-${weekEnd.getDate()}`;

            const grid = document.getElementById('weekGrid');
            grid.innerHTML = '';

            // 요일 헤더
            const dayNames = ['월', '화', '수', '목', '금', '토', '일'];
            dayNames.forEach((day, idx) => {
                const header = document.createElement('div');
                header.className = 'week-day-header';
                header.textContent = day;
                grid.appendChild(header);
            });

            // 날짜 셀
            weekDays.forEach((date, idx) => {
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                if (formatDate(date) === formatDate(selectedDate)) {
                    cell.classList.add('selected');
                }
                
                cell.onclick = () => selectDate(date);

                const dateStr = String(date.getDate()).padStart(2, '0');
                cell.innerHTML = `<div class="day-date">${dateStr}</div><div class="day-events"></div>`;

                // 이 날짜의 일정 추가
                const daySchedules = allSchedules.filter(s => s.date === formatDate(date));
                const eventsContainer = cell.querySelector('.day-events');
                daySchedules.forEach(schedule => {
                    const badge = document.createElement('div');
                    badge.className = `event-badge ${schedule.category}`;
                    badge.textContent = schedule.title;
                    eventsContainer.appendChild(badge);
                });

                grid.appendChild(cell);
            });
        }

        function selectDate(date) {
            selectedDate = new Date(date);
            renderWeek();
            renderTasks();
            updateSelectedDateDisplay();
        }

        function updateSelectedDateDisplay() {
            document.getElementById('selectedDateDisplay').textContent = formatDate(selectedDate, 'FULL');
        }

        // 투두 렌더링
        function renderTasks() {
            const selectedDateStr = formatDate(selectedDate);
            let tasksToShow = allTasks.filter(t => t.date === selectedDateStr);

            if (currentFilter !== 'all') {
                tasksToShow = tasksToShow.filter(t => t.category === currentFilter);
            }

            const taskList = document.getElementById('taskList');
            const completed = tasksToShow.filter(t => t.completed).length;
            const total = allTasks.filter(t => t.date === selectedDateStr).length;

            document.getElementById('taskCounter').textContent = `${completed}/${total}`;

            if (tasksToShow.length === 0) {
                taskList.innerHTML = '<div class="empty-state">할일이 없습니다</div>';
                return;
            }

            taskList.innerHTML = tasksToShow.map(task => `
                <div class="task-item">
                    <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask('${task.id}', this.checked)">
                    <span class="task-text">${task.title}</span>
                    <span class="task-category ${task.category}">${getCategoryLabel(task.category)}</span>
                    <button class="task-delete" onclick="deleteTask('${task.id}')">×</button>
                </div>
            `).join('');
        }

        function getCategoryLabel(cat) {
            const labels = { work: '업무', personal: '개인', team: '팀연동' };
            return labels[cat] || cat;
        }

        // 투두 추가
        function addQuickTask() {
            const input = document.getElementById('quickAddInput');
            const title = input.value.trim();
            
            if (!title) return;

            const task = {
                id: Date.now().toString(),
                title,
                date: formatDate(selectedDate),
                category: 'work',
                completed: false,
                created_at: new Date().toISOString()
            };

            allTasks.push(task);
            saveToLocalStorage();
            
            if (supabase) {
                supabase.from('tasks').insert([task]).catch(e => console.log('Insert error:', e));
            }

            input.value = '';
            renderTasks();
        }

        function handleQuickAdd(event) {
            if (event.key === 'Enter') {
                addQuickTask();
            }
        }

        function toggleTask(id, completed) {
            const task = allTasks.find(t => t.id === id);
            if (task) {
                task.completed = completed;
                saveToLocalStorage();
                
                if (supabase) {
                    supabase.from('tasks').update({ completed }).eq('id', id).catch(e => console.log('Update error:', e));
                }
                
                renderTasks();
            }
        }

        function deleteTask(id) {
            allTasks = allTasks.filter(t => t.id !== id);
            saveToLocalStorage();
            
            if (supabase) {
                supabase.from('tasks').delete().eq('id', id).catch(e => console.log('Delete error:', e));
            }
            
            renderTasks();
        }

        function filterByCategory(category) {
            currentFilter = category;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderTasks();
        }

        // 페이지 로드
        init();
    </script>
</body>
</html>
